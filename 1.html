<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>
<body>
    <script>
        let indice = 12;
        let soma = 0;
        let k = 1;

        while (k < indice) {
            k = k + 1;
            soma = soma + k;
        }

        document.body.innerHTML = '<h1>SOMA = ' + soma + '</h1>';
    </script>
</body>
</html>
